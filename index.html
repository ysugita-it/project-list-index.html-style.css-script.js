<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件一覧</title>

  <!-- CSS読み込み -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>案件一覧</h1>

<input type="text" id="search" class="search" placeholder="キーワード検索">
  
<div class="filters">

  <select id="filterIndustry">
    <option value="">業種すべて</option>
  </select>

  <select id="filterExperience">
    <option value="">経験すべて</option>
  </select>

  <select id="filterHoliday">
    <option value="">休みすべて</option>
  </select>

  <div class="price-filter">
    単価
    <input type="number" id="minPrice" placeholder="最低"> 〜
    <input type="number" id="maxPrice" placeholder="最高">
  </div>

</div>

<div class="grid" id="projects"></div>

<!-- JS読み込み -->
<script src="script.js"></script>

</body>
</html>
